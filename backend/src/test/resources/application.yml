spring:
  datasource:
    url: jdbc:h2:mem:pharma_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driverClassName: org.h2.Driver
    username: sa
    password: ""

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

pharma:
  stockage:
    ordonnances:
      base_dir: ./build/test-data/ordonnances
    dossiers-tiers-payant:
      baseDir: ./build/test-data/dossiers_tiers_payant
  security:
    jwt:
      issuer: "pharma-system-test"
      hmac-secret: "test-secret-test-secret-test-secret-32chars"
      access-token-ttl: "PT1H"
      refresh-token-ttl: "PT8H"

logging:
  level:
    org.hibernate.SQL: warn

