spring:
  application:
    name: pharma-system-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/pharma
    username: pharma
    password: pharma

  jackson:
    serialization:
      write-dates-as-timestamps: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

pharma:
  stockage:
    ordonnances:
      base_dir: ${PHARMA_ORDONNANCES_DIR:./data/ordonnances}
    dossiers-tiers-payant:
      baseDir: ${PHARMA_DOSSIERS_TP_DIR:./data/dossiers_tiers_payant}
  security:
    jwt:
      issuer: "pharma-system"
      # Clé HMAC pour signer/valider les JWT (dev). À remplacer en prod par une valeur forte.
      # 32+ caractères recommandés.
      hmac-secret: "change-me-change-me-change-me-change-me"
      access-token-ttl: "PT1H"
      refresh-token-ttl: "PT8H"
  stocks:
    alertes:
      peremption:
        # À partir de J-90 : alerte et statut "PEREMPTION_PRECOCE"
        precoce_jours: 90
        # À partir de J-30 : alerte et statut "PEREMPTION_URGENTE"
        urgente_jours: 30
    reception:
      # Si la péremption est à moins de 6 mois, confirmation pharmacien requise
      alerte_peremption_mois: 6
      chaine_froid:
        # Exemple insulin/vaccins (si fourni): plage acceptable de température
        temp_min_c: 2.0
        temp_max_c: 8.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui

